; BitsyMiner Open Source
; Default target: LCDWiki 2.8inch ESP32-32E Display with ILI9341/XPT2046

[platformio]
default_envs = cyd
src_dir = BitsyMinerOpenSource

[env:cyd]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 115200
board_build.partitions = min_spiffs.csv

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    bblanchon/ArduinoJson@^7.2.0
    arduino-libraries/NTPClient@^3.2.1
    https://github.com/Ant2000/CustomJWT.git
    bitbank2/PNGdec@^1.1.0
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git

build_flags =
    ; --- BitsyMiner target configuration ---
    -DESP32_2432S028
    -DLCDWIKI_ESP32_32E_28
    -DDISABLE_BOOT_KEY_SCREEN_CYCLE
    -DARDUINO_RUNNING_CORE=0
    -DARDUINO_EVENT_RUNNING_CORE=0

    ; --- TFT_eSPI configuration for CYD ---
    -DUSER_SETUP_LOADED=1
    -DILI9341_2_DRIVER=1
    -DUSE_HSPI_PORT=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MISO=12
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTFT_BL=21
    -DTFT_BACKLIGHT_ON=HIGH
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_FONT8=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
    -DSPI_FREQUENCY=55000000
    -DSPI_READ_FREQUENCY=20000000
